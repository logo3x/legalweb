<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" role="img" aria-label="Legal Web">
  <title>Legal Web</title>
  <defs>
    <linearGradient id="lwShield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="55%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="lwShieldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!--
    Canvas 700 x 200 (aspecto 3.5:1).
    A render h=40px da ancho 140px y texto "Legal Web" ~16px legible.
  -->

  <!-- Escudo -->
  <path d="
    M 80 10
    C 80 10, 102 18, 150 22
    L 150 102
    C 150 152, 119 184, 80 195
    C 41 184, 10 152, 10 102
    L 10 22
    C 58 18, 80 10, 80 10
    Z"
    fill="url(#lwShield)"
    stroke="url(#lwShieldEdge)"
    stroke-width="3"
    stroke-linejoin="round"/>

  <!-- Borde interior aureo -->
  <path d="
    M 80 26
    C 80 26, 96 32, 138 35
    L 138 96
    C 138 138, 109 167, 80 176
    C 51 167, 22 138, 22 96
    L 22 35
    C 64 32, 80 26, 80 26
    Z"
    fill="none"
    stroke="#93C5FD"
    stroke-width="1"
    stroke-opacity="0.55"/>

  <!-- Balanza -->
  <path d="M 35 86 L 60 86 L 56 92 L 39 92 Z" fill="#FFFFFF"/>
  <path d="M 100 86 L 125 86 L 121 92 L 104 92 Z" fill="#FFFFFF"/>
  <line x1="47" y1="86" x2="74" y2="74" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="113" y1="86" x2="86" y2="74" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="35" y="70" width="90" height="4" rx="2" fill="#FFFFFF"/>
  <circle cx="80" cy="66" r="4.5" fill="#FFFFFF"/>
  <rect x="76.5" y="74" width="7" height="58" rx="2" fill="#FFFFFF"/>
  <path d="M 60 132 L 100 132 L 95 150 L 65 150 Z" fill="#FFFFFF"/>

  <!-- Acento circuito -->
  <g stroke="#60A5FA" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="#60A5FA">
    <polyline points="14,108 28,108 33,114 50,114" fill="none"/>
    <circle cx="14" cy="108" r="2.4"/>
    <circle cx="50" cy="114" r="2.4"/>
  </g>

  <!-- Tipografia -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" fill="#1E3A8A">
    <text x="180" y="112" font-size="74" font-weight="800" letter-spacing="-2">Legal Web</text>
    <text x="184" y="158" font-size="30" font-weight="500" letter-spacing="0.2" fill="#475569">Control inteligente de tus procesos legales</text>
  </g>
</svg>
